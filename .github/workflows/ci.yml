name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests (mock path, no GPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev extras
        run: pip install -e ".[dev]"
      # The mock backends run on the standard library alone, so the whole
      # suite passes with no GPU and no API key. The Ray executor tests
      # self-skip when ray isn't installed (they're covered by the [ray] extra).
      - name: Run test suite
        run: pytest -q
